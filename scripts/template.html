<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour Decisions -- Weekly Performance Report -- {{report_week}}</title>
<style>
  :root {
    --navy: #1B2A4A;
    --navy-mid: #2d3d6e;
    --amber: #D4A853;
    --amber-light: #F0CC87;
    --amber-dark: #A07830;
    --green: #2ECC71;
    --yellow: #eab308;
    --red: #E74C3C;
    --fm-color: #7C3AED;
    --page-bg: #f5f6fa;
    --card-bg: #ffffff;
    --text-dark: #1B2A4A;
    --text-mid: #444;
    --text-muted: #888;
    --text-label: #666;
    --border-light: #eee;
    --row-alt: #f9f9fb;
    --shadow: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-md: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--page-bg); color: var(--text-dark); font-size: 14px; line-height: 1.5;
  }
  .container { max-width: 1140px; margin: 0 auto; padding: 24px 20px; }

  .header-banner {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    border-radius: var(--radius-lg); padding: 32px 36px; color: #fff; margin-bottom: 28px;
    box-shadow: 0 4px 20px rgba(27,42,74,0.25);
  }
  .header-banner h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .header-banner .subtitle { font-size: 15px; color: var(--amber); font-weight: 600; }
  .header-banner .meta { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 6px; }
  .header-banner .locations { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .header-banner .loc-badge {
    font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 600;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  }

  .nav-tabs {
    display: flex; justify-content: center; gap: 0; margin-bottom: 20px;
    background: var(--card-bg); border-radius: 10px; padding: 4px; width: fit-content;
    margin-left: auto; margin-right: auto; box-shadow: var(--shadow);
  }
  .nav-tabs a {
    padding: 8px 24px; font-size: 13px; font-weight: 600; text-decoration: none;
    border-radius: 8px; color: var(--text-muted); transition: all 0.2s;
  }
  .nav-tabs a.active { background: var(--navy); color: #fff; }
  .nav-tabs a:hover:not(.active) { color: var(--text-dark); }

  /* Location Toggle */
  .loc-toggle {
    display: flex; gap: 0; margin-bottom: 20px;
    background: var(--card-bg); border-radius: 10px; padding: 4px;
    box-shadow: var(--shadow); width: fit-content;
  }
  .loc-toggle button {
    padding: 7px 18px; font-size: 12px; font-weight: 600; border: none; cursor: pointer;
    border-radius: 8px; color: var(--text-muted); background: transparent; transition: all 0.2s;
    white-space: nowrap;
  }
  .loc-toggle button.active { background: var(--navy); color: #fff; }
  .loc-toggle button:hover:not(.active) { color: var(--text-dark); background: #f0f1f5; }

  .section { margin-bottom: 28px; }
  .section-title {
    font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-bullet { color: var(--amber); font-size: 12px; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; max-width: 100%; }
  @media (min-width: 769px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
  .kpi-card {
    background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow-md);
    padding: 18px 20px; border-left: 4px solid var(--amber);
  }
  .kpi-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text-label); margin-bottom: 6px;
  }
  .kpi-value { font-size: 28px; font-weight: 700; color: var(--text-dark); display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .wow-badge { display: inline-flex; align-items: center; gap: 2px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; white-space: nowrap; line-height: 1.3; }
  .wow-badge.up { background: #e8f8ef; color: var(--green); }
  .wow-badge.down { background: #fdecea; color: var(--red); }
  .wow-badge.up-bad { background: #fdecea; color: var(--red); }
  .wow-badge.down-good { background: #e8f8ef; color: var(--green); }
  .kpi-breakdown {
    display: flex; flex-direction: column; gap: 3px;
    margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-light);
    font-size: 11px;
  }
  .kpi-breakdown .loc-val { display: flex; justify-content: space-between; align-items: baseline; padding: 1px 0; }
  .kpi-breakdown .loc-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; flex-shrink: 0; margin-right: 8px; }
  .kpi-breakdown .loc-num { font-weight: 700; color: var(--text-dark); font-size: 12px; font-variant-numeric: tabular-nums; text-align: right; }

  table { width: 100%; border-collapse: collapse; }
  th {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--text-label); padding: 10px 12px;
    text-align: left; border-bottom: 2px solid var(--border-light);
  }
  td { padding: 10px 12px; border-bottom: 1px solid #f2f3f7; font-size: 13px; }
  tr:nth-child(even) { background: var(--row-alt); }
  .td-num { text-align: right; font-variant-numeric: tabular-nums; }

  /* Hourly Revenue table column alignment */
  .hourly-table th:nth-child(2),
  .hourly-table th:nth-child(3) { text-align: right; }
  /* Daily Revenue table column alignment */
  .daily-table th:nth-child(2),
  .daily-table th:nth-child(3),
  .daily-table th:nth-child(4),
  .daily-table th:nth-child(5) { text-align: right; }
  /* Top Products table column alignment */
  .products-table th:nth-child(1),
  .products-table td:nth-child(1) { text-align: center; }
  .products-table th:nth-child(3),
  .products-table th:nth-child(4) { text-align: right; }
  /* Labor table column alignment */
  .labor-data-table th:nth-child(n+2) { text-align: right; }

  .rank-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 50%;
    background: #edf0f7; color: var(--text-mid); font-size: 11px; font-weight: 700;
  }
  .rank-badge.top3 { background: var(--amber); color: #fff; }

  .pct-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .pct-green { background: #e8f8ef; color: var(--green); }
  .pct-yellow { background: #fef9e7; color: #b7950b; }
  .pct-red { background: #fdecea; color: var(--red); }

  .fin-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 5px 0; font-size: 13px;
  }
  .fin-row-label { color: var(--text-mid); }
  .fin-row-val { font-weight: 600; font-variant-numeric: tabular-nums; }
  .fin-row-val.negative { color: var(--red); }
  .fin-total {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 0 4px; border-top: 2px solid var(--navy); margin-top: 4px;
  }
  .fin-total-label { font-weight: 700; font-size: 14px; color: var(--text-dark); }
  .fin-total-val { font-weight: 700; font-size: 18px; }

  .wow-card {
    background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow-md);
    padding: 16px 20px; text-align: center; border-top: 3px solid var(--amber);
  }
  .wow-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-label); margin-bottom: 6px; }
  .wow-value { font-size: 24px; font-weight: 700; }
  .wow-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 20px 22px; }
  .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-label); margin-bottom: 12px; }

  .loc-view { display: none; }
  .loc-view.active { display: block; }

  /* Staffing indicator */
  .staff-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase;
  }
  .staff-ok { background: #e8f8ef; color: var(--green); }
  .staff-warn { background: #fef9e7; color: #b7950b; }
  .staff-over { background: #fdecea; color: var(--red); }

  /* Responsive */
  @media (max-width: 768px) {
    .container { padding: 16px 12px; }
    .header-banner { padding: 24px 20px; }
    .header-banner h1 { font-size: 20px; }
    .kpi-grid { grid-template-columns: 1fr 1fr !important; gap: 10px; }
    .kpi-value { font-size: 22px; }
    .kpi-breakdown { flex-direction: column; gap: 2px; }
    .kpi-breakdown .loc-val { display: flex; justify-content: space-between; padding: 1px 0; }
    body { overflow-x: hidden; }
    .loc-toggle { flex-wrap: wrap; width: 100%; }
    .loc-toggle button { flex: 1; min-width: 0; padding: 7px 8px; font-size: 11px; }
    .wow-grid { grid-template-columns: 1fr 1fr !important; }
    .fin-3col { grid-template-columns: 1fr !important; }
    .fin-2col { grid-template-columns: 1fr !important; }
    .pay-grid { grid-template-columns: 1fr 1fr !important; }
    .products-2col { grid-template-columns: 1fr !important; }
    table { font-size: 12px; }
    th, td { padding: 8px 6px; }
    .td-num { font-size: 12px; }
    .labor-table-wide { display: none; }
    .labor-cards-mobile { display: block !important; }
    .wow-value { font-size: 20px; }
    .section-title { font-size: 16px; }
    .nav-tabs a { padding: 8px 16px; font-size: 12px; }
  }

  @media (max-width: 480px) {
    .kpi-grid { grid-template-columns: 1fr; }
    .wow-grid { grid-template-columns: 1fr 1fr !important; }
    .pay-grid { grid-template-columns: 1fr !important; }
  }

  /* Mobile: daily table day column no-wrap */
  @media (max-width: 768px) {
    .daily-table td:first-child,
    .daily-table th:first-child { white-space: nowrap; }
    .daily-table td, .daily-table th { padding: 8px 4px; font-size: 11px; }
    .daily-table .td-num { font-size: 11px; }
    /* Hide the mini bar chart column on mobile to save space */
    .daily-table th:last-child,
    .daily-table td:last-child { display: none; }
  }
</style>

<script>
(function() {
  var AUTH_KEY = 'pd_auth_token';
  var HASH = '5994471abb01112afcc18159f6cc74b4f511b99806da59b3caf5a9c173cacfc5';
  
  function checkAuth() {
    return localStorage.getItem(AUTH_KEY) === HASH;
  }
  
  async function hashPassword(pw) {
    var enc = new TextEncoder().encode(pw);
    var buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  }
  
  if (checkAuth()) {
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('pd-gate').style.display = 'none';
      document.getElementById('pd-content').style.display = 'block';
    });
  }
  
  window.pdUnlock = async function() {
    var pw = document.getElementById('pd-pw').value;
    var h = await hashPassword(pw);
    if (h === HASH) {
      localStorage.setItem(AUTH_KEY, HASH);
      document.getElementById('pd-gate').style.display = 'none';
      document.getElementById('pd-content').style.display = 'block';
    } else {
      document.getElementById('pd-error').style.display = 'block';
      document.getElementById('pd-pw').value = '';
      document.getElementById('pd-pw').focus();
    }
  };
})();
</script>
<style>
#pd-gate {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, #1B2A4A 0%, #2d3d6e 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 99999; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
#pd-gate .gate-box {
  background: #fff; border-radius: 16px; padding: 40px 36px; text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2); max-width: 360px; width: 90%;
}
#pd-gate .gate-logo {
  width: 56px; height: 56px; border-radius: 12px; background: #1B2A4A;
  color: #D4A853; font-weight: 800; font-size: 22px; display: flex;
  align-items: center; justify-content: center; margin: 0 auto 16px;
}
#pd-gate h2 { font-size: 20px; color: #1B2A4A; margin-bottom: 4px; }
#pd-gate p { font-size: 13px; color: #888; margin-bottom: 20px; }
#pd-gate input {
  width: 100%; padding: 10px 14px; border: 2px solid #eee; border-radius: 8px;
  font-size: 14px; margin-bottom: 12px; outline: none; box-sizing: border-box;
}
#pd-gate input:focus { border-color: #D4A853; }
#pd-gate button {
  width: 100%; padding: 10px; background: #1B2A4A; color: #fff; border: none;
  border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
}
#pd-gate button:hover { background: #2d3d6e; }
#pd-error { display: none; color: #E74C3C; font-size: 12px; margin-top: 8px; }
#pd-content { display: none; }
</style>

</head>
<body>

<div id="pd-gate">
  <div class="gate-box">
    <div class="gate-logo">PD</div>
    <h2>Pour Decisions</h2>
    <p>Enter the password to view this report</p>
    <input type="password" id="pd-pw" placeholder="Password" onkeydown="if(event.key==='Enter')pdUnlock()">
    <button onclick="pdUnlock()">Unlock</button>
    <div id="pd-error">Incorrect password. Please try again.</div>
  </div>
</div>
<div id="pd-content">

<div class="container">

  <!-- Navigation -->
  <div class="nav-tabs">
    <a href="index.html" class="active">Performance</a>
    <a href="reviews.html">Reviews</a>
    <a href="pnl.html">P&amp;L</a>
  </div>

{{BODY}}

</div>

<script>
// Location toggle functionality
document.addEventListener('DOMContentLoaded', function() {
  const toggleBtns = document.querySelectorAll('#locToggle button');
  const allViews = document.querySelectorAll('.loc-view');

  toggleBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      const loc = this.dataset.loc;
      toggleBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      allViews.forEach(view => {
        if (view.dataset.view === loc) {
          view.classList.add('active');
        } else {
          view.classList.remove('active');
        }
      });
    });
  });
});
</script>

</div>
</body>
</html>
